<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DANTE · Neoflux</title>
<style>
  :root{
    --bg:#0a0e14; --bg2:#0f1520; --panel:#121a26; --line:#1e2a3a;
    --txt:#dce6f2; --dim:#7d8da4; --accent:#33e1ed; --accent2:#4f7cff;
    --user:#1b2a44; --tool:#152232; --ok:#3ad29f; --err:#ff6b6b;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    background:radial-gradient(1200px 600px at 70% -10%,#12263a33,transparent),var(--bg);
    color:var(--txt); font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex; flex-direction:column; height:100vh;
  }
  header{
    display:flex; align-items:center; gap:12px; padding:14px 20px;
    border-bottom:1px solid var(--line); background:linear-gradient(180deg,#0e1520,#0a0e14);
  }
  .logo{
    width:34px;height:34px;border-radius:9px;flex:none;
    background:conic-gradient(from 210deg,var(--accent),var(--accent2),var(--accent));
    box-shadow:0 0 18px #33e1ed55; display:grid;place-items:center;
    font-weight:800;color:#04121a;font-size:15px;
  }
  header h1{font-size:16px;margin:0;letter-spacing:.14em;font-weight:700}
  header .sub{font-size:11px;color:var(--dim);letter-spacing:.06em;margin-top:1px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--dim);margin-left:auto;transition:.3s}
  .dot.on{background:var(--ok);box-shadow:0 0 10px var(--ok)}
  .dot.busy{background:var(--accent);box-shadow:0 0 10px var(--accent);animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.35}}

  #chat{flex:1;overflow-y:auto;padding:24px 16px;display:flex;flex-direction:column;gap:16px}
  .wrap{max-width:820px;width:100%;margin:0 auto}
  .msg{display:flex;gap:12px;max-width:820px;width:100%;margin:0 auto;animation:in .25s ease}
  @keyframes in{from{opacity:0;transform:translateY(6px)}}
  .msg .av{width:30px;height:30px;border-radius:8px;flex:none;display:grid;place-items:center;font-size:13px;font-weight:700}
  .msg.dante .av{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#04121a}
  .msg.user{flex-direction:row-reverse}
  .msg.user .av{background:var(--user);color:var(--accent)}
  .bubble{padding:11px 15px;border-radius:13px;background:var(--panel);border:1px solid var(--line);min-width:0}
  .msg.user .bubble{background:var(--user);border-color:#26426e}
  .bubble p{margin:.35em 0}
  .bubble h3,.bubble h4{margin:.5em 0 .3em;font-size:14px;color:var(--accent)}
  .bubble ul{margin:.35em 0;padding-left:20px}
  .bubble code{background:#0a1018;border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:12.5px;font-family:ui-monospace,Menlo,monospace}
  .bubble table{border-collapse:collapse;margin:.5em 0;font-size:13px;display:block;overflow-x:auto}
  .bubble th,.bubble td{border:1px solid var(--line);padding:5px 9px;text-align:left;white-space:nowrap}
  .bubble th{background:#0e1622;color:var(--accent)}
  .tools{display:flex;flex-wrap:wrap;gap:6px;margin:2px 0 8px}
  .chip{font:11px ui-monospace,Menlo,monospace;color:var(--accent);background:var(--tool);
        border:1px solid #24405a;border-radius:20px;padding:3px 10px;display:inline-flex;gap:6px;align-items:center}
  .chip::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent)}
  .typing{display:inline-flex;gap:4px;padding:4px 2px}
  .typing i{width:6px;height:6px;border-radius:50%;background:var(--dim);animation:blink 1.2s infinite}
  .typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%{opacity:.25}40%{opacity:1}}

  footer{padding:14px 16px;border-top:1px solid var(--line);background:#0b1017}
  .inbar{max-width:820px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
  textarea{
    flex:1;resize:none;background:var(--panel);color:var(--txt);border:1px solid var(--line);
    border-radius:12px;padding:12px 14px;font:15px inherit;max-height:140px;outline:none
  }
  textarea:focus{border-color:var(--accent)}
  button#send{
    background:linear-gradient(135deg,var(--accent),var(--accent2));color:#04121a;border:0;
    border-radius:12px;padding:12px 18px;font-weight:700;cursor:pointer;flex:none
  }
  button#send:disabled{opacity:.4;cursor:default}
  .hint{max-width:820px;margin:8px auto 0;font-size:11px;color:var(--dim);text-align:center}
  .err{color:var(--err)}
</style>
</head>
<body>
<header>
  <div class="logo">D</div>
  <div>
    <h1>DANTE</h1>
    <div class="sub">NEOFLUX OPS · osservatore read-only</div>
  </div>
  <div class="dot" id="dot" title="stato"></div>
</header>

<div id="chat">
  <div class="msg dante"><div class="av">D</div><div class="bubble">
    Ciao, sono <b>DANTE</b>. Osservo l'infrastruttura Neoflux (Virtualizor, server) in sola lettura.
    Chiedimi pure: <i>"Come sta la piattaforma?"</i>, <i>"Quale VPS consuma più RAM?"</i>, <i>"Dettagli di my.wapoo.it"</i>.
  </div></div>
</div>

<footer>
  <div class="inbar">
    <textarea id="in" rows="1" placeholder="Scrivi a DANTE…  (Invio per inviare, Shift+Invio a capo)"></textarea>
    <button id="send">Invia</button>
  </div>
  <div class="hint" id="hint">Connessione…</div>
</footer>

<script>
const chat=document.getElementById('chat'), input=document.getElementById('in'),
      sendBtn=document.getElementById('send'), dot=document.getElementById('dot'), hint=document.getElementById('hint');
let ws, busy=false, cur=null;

function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}

// mini-renderer markdown: heading, liste, tabelle, bold, code inline
function md(src){
  const lines=esc(src).split('\n'); let html='', i=0;
  const inline=t=>t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>');
  while(i<lines.length){
    let l=lines[i];
    if(/^#{1,6}\s/.test(l)){html+='<h4>'+inline(l.replace(/^#+\s/,''))+'</h4>';i++;continue;}
    if(l.includes('|') && i+1<lines.length && /^\s*\|?[\s:|-]+\|?\s*$/.test(lines[i+1]) && lines[i+1].includes('-')){
      const row=s=>s.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(c=>c.trim());
      const head=row(l); i+=2; let body='';
      while(i<lines.length && lines[i].includes('|')){body+='<tr>'+row(lines[i]).map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>';i++;}
      html+='<table><thead><tr>'+head.map(c=>'<th>'+inline(c)+'</th>').join('')+'</tr></thead><tbody>'+body+'</tbody></table>';
      continue;
    }
    if(/^\s*[-*]\s/.test(l)){let items='';
      while(i<lines.length && /^\s*[-*]\s/.test(lines[i])){items+='<li>'+inline(lines[i].replace(/^\s*[-*]\s/,''))+'</li>';i++;}
      html+='<ul>'+items+'</ul>';continue;}
    if(l.trim()==''){html+='';i++;continue;}
    html+='<p>'+inline(l)+'</p>';i++;
  }
  return html;
}

function addMsg(who){
  const m=document.createElement('div'); m.className='msg '+who;
  m.innerHTML='<div class="av">'+(who==='user'?'TU':'D')+'</div><div class="bubble"></div>';
  chat.appendChild(m); chat.scrollTop=chat.scrollHeight;
  return m.querySelector('.bubble');
}

function startDante(){
  const b=addMsg('dante');
  b.innerHTML='<div class="tools"></div><div class="content"><div class="typing"><i></i><i></i><i></i></div></div>';
  cur={bubble:b, tools:b.querySelector('.tools'), content:b.querySelector('.content'), raw:'', started:false};
}
function setBusy(v){busy=v; sendBtn.disabled=v; dot.className='dot '+(v?'busy':'on'); if(!v)hint.textContent='Pronto.';}

function connect(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(proto+'://'+location.host+'/ws');
  ws.onopen=()=>{dot.className='dot on';hint.textContent='Pronto.';};
  ws.onclose=()=>{dot.className='dot';hint.textContent='Disconnesso — riconnessione…';setBusy(false);setTimeout(connect,2000);};
  ws.onmessage=e=>{
    const d=JSON.parse(e.data);
    if(d.type==='ready'){hint.textContent='Pronto.';}
    else if(d.type==='tool'){
      if(!cur)return; const c=document.createElement('span'); c.className='chip';
      c.textContent=d.name.replace('mcp__neoflux-','').replace(/__/g,' · ').replace('ToolSearch','ricerca strumenti');
      cur.tools.appendChild(c);
    }
    else if(d.type==='text'){
      if(!cur)return;
      if(!cur.started){cur.content.innerHTML='';cur.started=true;}
      cur.raw+=d.text; cur.content.innerHTML=md(cur.raw); chat.scrollTop=chat.scrollHeight;
    }
    else if(d.type==='error'){
      if(cur){cur.content.innerHTML='<span class="err">Errore: '+esc(d.text)+'</span>';}
      setBusy(false);
    }
    else if(d.type==='done'){
      if(cur && !cur.started){cur.content.innerHTML='<span class="err">(nessuna risposta)</span>';}
      cur=null; setBusy(false);
    }
    chat.scrollTop=chat.scrollHeight;
  };
}

function send(){
  const t=input.value.trim(); if(!t||busy||!ws||ws.readyState!==1)return;
  addMsg('user').textContent=t; input.value=''; input.style.height='auto';
  setBusy(true); hint.textContent='DANTE sta lavorando…'; startDante();
  ws.send(JSON.stringify({message:t}));
}
sendBtn.onclick=send;
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,140)+'px';});
connect();
</script>
</body>
</html>
